    <meta name="google-site-verification" content="01zM2MOlYDuVcIFak7A01KTTpZwsnS2z14WZYz1TsxE" />

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    
    <!-- PayPal SDK -->
    <script src="https://www.paypal.com/sdk/js?client-id=BAAduCqSQY22LnkY_KBfvUgj4b_Wq9R04GgDwAyMONOR3SdjjpJCVHMenPXanLtgIdPFKTrBmxFVKpuc4Y&components=hosted-buttons&disable-funding=venmo&currency=EUR"></script>
    
    <style>
        :root {
            --dark-green: #1f2e2a;
            --deep-green: #243834;
            --gold: #c8a45d;
            --gold-light: #d4af6a;
            --ivory: #f5f5f0;
            --white: #ffffff;
            --gray: #b8b8b8;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--ivory);
            color: #333;
            margin: 0;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        .font-display { font-family: 'Playfair Display', serif; }
        
        /* KLASA ZA SAKRIVANJE NASLOVA OD LJUDI (SEO friendly) */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        .menu-item-outline { color: white; text-shadow: none; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--dark-green); }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 4px; }
        
        @keyframes fade-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up { animation: fade-up 0.6s ease-out forwards; }
        .gallery-scroll::-webkit-scrollbar { height: 4px; }
        .gallery-scroll::-webkit-scrollbar-thumb { background: var(--gold); }
    </style>
</head>
<body class="h-full">

    <!-- SEO NASLOV: Google ga vidi, ali posetioci NE jer koristi klasu sr-only -->

    <div id="root">
        <!-- Učitavanje (vidi se samo par sekundi dok se React ne podigne) -->
        <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; background-color: #f8f9fa;">
            <div style="text-align: center;">

                <p style="color: #777;">Učitavanje oaze mira...</p>
            </div>
        </div>
    </div>

    <!-- Glavna skripta -->
    <script type="module" src="/index.tsx"></script>
</body>
</html>
